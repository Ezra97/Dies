<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="mystyle.css"/>
    <script type="text/javascript">
        var lastIndex = 0;

        function randomImage()
        {
            var theImage1 = document.getElementById('myImage1');
            var theImage2 = document.getElementById('myImage2');
            var imgArray = new Array('di2.jpeg', 'di3.jpeg', 'di4.jpeg', 'di5.jpeg', 'di6.jpeg','di1.jpeg');
            var imgIndex1 = 0, imgIndex2 = 0;
            if (imgArray.length > 1)
            {
                while (imgIndex1 == lastIndex)
                {
                    imgIndex1 = Math.floor(Math.random() * imgArray.length);
                    imgIndex2 = Math.floor(Math.random() * imgArray.length);
                }
                theImage1.src = imgArray[imgIndex1];
                theImage2.src = imgArray[imgIndex2];
            }
            else
                return false;
        }
    </script>
    <title>Page Title</title>
</head>
<body>

    <h1>Roll the dice</h1>

    <button onclick="randomImage()">Roll</button>
    <br />
    <img src="di1.jpeg" alt="dice" id="myImage1" />
    <img src="di2.jpeg" alt="dice" id="myImage2" />
</body>
</html>
